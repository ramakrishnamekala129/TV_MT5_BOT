<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Antigravity Quant Trading Grid — Multi-pane live trading dashboard with MT5, Hyperliquid, and yfinance integration">
    <title>Antigravity // Quant Trading Grid</title>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            fetch('/api/log_error', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, source, lineno, colno, stack: error ? error.stack : '' })
            }).catch(() => {});
            return false;
        };
    </script>

    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- TradingView Lightweight Charts Library (Local) -->
    <script src="/static/js/lightweight-charts.standalone.production.js"></script>

    <!-- Pure JS Technical Indicators Engine -->
    <script src="/static/js/indicators.js?v=1.2.0"></script>

    <!-- Local Custom Premium Stylesheets -->
    <link rel="stylesheet" href="/static/css/style.css?v=1.2.0">
    <link rel="stylesheet" href="/static/css/trading.css?v=1.2.0">
</head>
<body>
    <div class="dashboard-wrapper">

        <!-- ─────────────────────── Premium Header ─────────────────────── -->
        <header class="main-header glass-effect">
            <div class="header-branding">
                <div class="glow-indicator"></div>
                <h1>QUANT TRADING</h1>
            </div>

            <div class="header-controls">
                <div class="control-group">
                    <label for="chart-count-select">NUMBER OF PANES</label>
                    <select id="chart-count-select" class="custom-select pane-count-select-native" aria-hidden="true" tabindex="-1">
                        <option value="1">1 Pane (Full Screen)</option>
                        <option value="2">2 Panes (Side-by-Side)</option>
                        <option value="4">4 Panes (2×2 Grid)</option>
                        <option value="6" selected>6 Panes (3×2 Grid)</option>
                        <option value="8">8 Panes (4×2 Grid)</option>
                    </select>
                    <div class="pane-layout-toggle" role="radiogroup" aria-label="Number of chart panes">
                        <button type="button" class="pane-layout-btn" data-pane-count="1" role="radio" aria-checked="false" title="1 Pane">
                            <span class="pane-layout-icon layout-1" aria-hidden="true"><i></i></span>
                            <span class="pane-layout-count">1</span>
                        </button>
                        <button type="button" class="pane-layout-btn" data-pane-count="2" role="radio" aria-checked="false" title="2 Panes">
                            <span class="pane-layout-icon layout-2" aria-hidden="true"><i></i><i></i></span>
                            <span class="pane-layout-count">2</span>
                        </button>
                        <button type="button" class="pane-layout-btn" data-pane-count="4" role="radio" aria-checked="false" title="4 Panes">
                            <span class="pane-layout-icon layout-4" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
                            <span class="pane-layout-count">4</span>
                        </button>
                        <button type="button" class="pane-layout-btn" data-pane-count="6" role="radio" aria-checked="true" title="6 Panes">
                            <span class="pane-layout-icon layout-6" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></span>
                            <span class="pane-layout-count">6</span>
                        </button>
                        <button type="button" class="pane-layout-btn" data-pane-count="8" role="radio" aria-checked="false" title="8 Panes">
                            <span class="pane-layout-icon layout-8" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
                            <span class="pane-layout-count">8</span>
                        </button>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="global-lot-size">DEFAULT LOT</label>
                    <input type="number" id="global-lot-size" class="custom-select" value="0.10" step="0.01" min="0.01" style="width: 70px; padding: 4px; text-align: center;">
                </div>

                <div class="mt5-status-badge disconnected" id="mt5-status-panel" title="Click to test MT5 Connection">
                    <span class="status-dot"></span>
                    <span class="status-label">MT5: DISCONNECTED</span>
                </div>
            </div>
        </header>

        <!-- ─────────────────────── Chart Grid ─────────────────────── -->
        <main class="grid-container" id="grid-container"></main>
    </div>

    <!-- ═══════════════════ Pane Template ═══════════════════ -->
    <template id="chart-pane-template">
        <div class="chart-pane glass-effect" data-pane-id="">

            <!-- ── Pane Header Controls ── -->
            <div class="pane-header">
                <div class="pane-title">PANE #<span class="pane-num">1</span></div>

                <div class="pane-settings">
                    <select class="pane-source-select custom-select-sm">
                        <option value="hyperliquid">Hyperliquid (Crypto)</option>
                        <option value="yfinance">yfinance (Indian Stocks)</option>
                        <option value="mt5">MetaTrader 5 (FX/CFD)</option>
                    </select>

                    <div class="symbol-input-wrapper">
                        <input type="text" class="pane-symbol-input" placeholder="Symbol" value="BTC" list="symbols-datalist">
                    </div>

                    <select class="pane-tf-select custom-select-sm">
                        <option value="1m">1m</option>
                        <option value="5m" selected>5m</option>
                        <option value="15m">15m</option>
                        <option value="1h">1h</option>
                        <option value="4h">4h</option>
                        <option value="1d">1d</option>
                    </select>
                </div>
            </div>

            <!-- ── Color-coded Price Ticker ── -->
            <div class="ticker-bar">
                <span class="ticker-symbol">BTC</span>
                <span class="ticker-price">--</span>
                <span class="ticker-direction">--</span>
            </div>

            <!-- ── Indicator Toolbar ── -->
            <div class="indicator-toolbar" aria-label="Chart analysis toolbar">
                <div class="ind-section ind-section-primary">
                    <span class="ind-group-label">Indicators</span>
                    <button class="indicator-library-btn" title="Open indicator library" aria-label="Open indicator library">+</button>
                    <button class="ind-chip" data-indicator="sma20"     title="Simple Moving Average 20">SMA 20</button>
                    <button class="ind-chip" data-indicator="sma50"     title="Simple Moving Average 50">SMA 50</button>
                    <button class="ind-chip" data-indicator="ema9"      title="Exponential Moving Average 9">EMA 9</button>
                    <button class="ind-chip" data-indicator="ema21"     title="Exponential Moving Average 21">EMA 21</button>
                    <button class="ind-chip" data-indicator="bb20"      title="Bollinger Bands 20,2">BB</button>
                    <button class="ind-chip" data-indicator="vwap"      title="Volume Weighted Average Price">VWAP</button>
                    <div class="ind-chip-group">
                        <button class="ind-chip" data-indicator="smc" title="Smart Money Concepts [LuxAlgo]">SMC</button>
                        <button class="ind-settings-icon" data-indicator="smc" title="SMC Settings" aria-label="SMC Settings">&#9881;</button>
                    </div>
                </div>

                <div class="ind-separator"></div>

                <div class="ind-section">
                    <span class="ind-group-label">Panels</span>
                    <button class="ind-chip" data-indicator="rsi14"     title="RSI 14">RSI</button>
                    <button class="ind-chip" data-indicator="macd"      title="MACD 12,26,9">MACD</button>
                    <button class="ind-chip" data-indicator="volume"    title="Volume Bars">VOL</button>
                </div>

                <div class="ind-separator"></div>

                <div class="ind-section ind-section-tools">
                    <span class="ind-group-label">Draw</span>
                    <button class="tool-chip" data-tool="hline"    title="Horizontal Line" aria-label="Horizontal Line">—</button>
                    <button class="tool-chip" data-tool="tline"    title="Trend Line" aria-label="Trend Line">↗</button>
                    <button class="tool-chip" data-tool="rect"     title="Rectangle / Box" aria-label="Rectangle / Box">▭</button>
                    <button class="tool-chip tool-erase" data-tool="erase" title="Erase last drawing" aria-label="Erase last drawing">✕</button>
                </div>
            </div>

            <!-- ── Main Chart Mount ── -->
            <div class="chart-mount">
                <!-- Interactive layer for MT5 draggable trading badges -->
                <div class="trading-overlay-container"></div>
                <div class="indicator-legend" aria-label="Active chart indicators"></div>
                
                <div class="pane-loading-overlay">
                    <div class="spinner"></div>
                    <span class="loading-text">Fetching historical data...</span>
                </div>
            </div>

            <!-- ── Sub-pane Oscillators (RSI / MACD / Volume) ── -->
            <div class="oscillators-container hidden"></div>
        </div>
    </template>

    <!-- Global symbol datalist -->
    <datalist id="symbols-datalist">
        <option value="BTC">BTC (Hyperliquid)</option>
        <option value="ETH">ETH (Hyperliquid)</option>
        <option value="SOL">SOL (Hyperliquid)</option>
        <option value="ARB">ARB (Hyperliquid)</option>
        <option value="SUI">SUI (Hyperliquid)</option>
        <option value="AVAX">AVAX (Hyperliquid)</option>
        <option value="RELIANCE.NS">RELIANCE (yfinance)</option>
        <option value="TCS.NS">TCS (yfinance)</option>
        <option value="INFY.NS">INFY (yfinance)</option>
        <option value="HDFCBANK.NS">HDFCBANK (yfinance)</option>
        <option value="^NSEI">NIFTY 50 (yfinance)</option>
        <option value="EURUSD">EURUSD (MT5)</option>
        <option value="GBPUSD">GBPUSD (MT5)</option>
        <option value="USDJPY">USDJPY (MT5)</option>
        <option value="AUDUSD">AUDUSD (MT5)</option>
        <option value="XAUUSD">XAUUSD / GOLD (MT5)</option>
    </datalist>

    <!-- TradingView-style Indicator Library -->
    <div id="indicator-library-dialog" class="indicator-library-modal hidden glass-effect" role="dialog" aria-modal="true" aria-labelledby="indicator-library-title">
        <div class="indicator-library-header">
            <div>
                <h3 id="indicator-library-title">Indicators</h3>
                <span id="indicator-library-pane-label">Pane #1</span>
            </div>
            <button class="close-settings-btn" id="indicator-library-close" aria-label="Close indicator library">✕</button>
        </div>
        <div class="indicator-library-search-row">
            <input type="search" id="indicator-library-search" placeholder="Search indicators" autocomplete="off">
        </div>
        <div class="indicator-library-body">
            <div class="indicator-list" id="indicator-library-list"></div>
            <div class="indicator-settings-panel">
                <div class="indicator-settings-title">
                    <h4 id="indicator-settings-name">Select an indicator</h4>
                    <span id="indicator-settings-category">Built-ins</span>
                </div>
                <div id="indicator-settings-fields" class="indicator-settings-fields"></div>
                <div class="indicator-settings-actions">
                    <button id="indicator-library-remove" class="btn-secondary">Remove</button>
                    <button id="indicator-library-apply" class="btn-primary">Add / Apply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Context Menu for Trading -->
    <div id="chart-context-menu" class="context-menu hidden">
        <div class="menu-item-input" style="padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <label style="font-size: 11px; opacity: 0.7;">Lot Size:</label>
            <input type="number" id="cmenu-volume-input" value="0.10" step="0.01" min="0.01" style="width: 60px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 2px 4px; border-radius: 4px; text-align: center; font-size: 12px;">
        </div>
        <div class="menu-item" id="cmenu-buy-limit">Buy <span class="cmenu-vol-disp">0.1</span> <span class="cmenu-symbol"></span> @ <span class="cmenu-price"></span> limit</div>
        <div class="menu-item" id="cmenu-sell-limit">Sell <span class="cmenu-vol-disp">0.1</span> <span class="cmenu-symbol"></span> @ <span class="cmenu-price"></span> limit</div>
        <div class="menu-separator"></div>
        <div class="menu-item" id="cmenu-buy-stop">Buy <span class="cmenu-vol-disp">0.1</span> <span class="cmenu-symbol"></span> @ <span class="cmenu-price"></span> stop</div>
        <div class="menu-item" id="cmenu-sell-stop">Sell <span class="cmenu-vol-disp">0.1</span> <span class="cmenu-symbol"></span> @ <span class="cmenu-price"></span> stop</div>
        <div class="menu-separator"></div>
        <div class="menu-item" id="cmenu-close-menu">Close Menu</div>
    </div>

    <!-- SMC Settings Dialog -->
    <div id="smc-settings-dialog" class="settings-modal hidden glass-effect">
        <div class="settings-header">
            <h3>⚙️ SMC Settings</h3>
            <button class="close-settings-btn" id="smc-settings-close">✕</button>
        </div>
        <div class="settings-body">
            <div class="settings-section">
                <h4>General Settings</h4>
                <div class="setting-row">
                    <label for="smc-cfg-mode">Mode</label>
                    <select id="smc-cfg-mode" class="custom-select-sm">
                        <option value="Historical">Historical</option>
                        <option value="Present">Present</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-style">Style</label>
                    <select id="smc-cfg-style" class="custom-select-sm">
                        <option value="Colored">Colored</option>
                        <option value="Monochrome">Monochrome</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h4>Swing Structure</h4>
                <div class="setting-row">
                    <label for="smc-cfg-showStructure">Show Swing Structure</label>
                    <input type="checkbox" id="smc-cfg-showStructure" checked>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-swingsLength">Swing Length</label>
                    <input type="number" id="smc-cfg-swingsLength" value="50" min="10" max="200" step="5">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showSwings">Show Swings Points</label>
                    <input type="checkbox" id="smc-cfg-showSwings">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showSwingBull">Bullish Structure</label>
                    <select id="smc-cfg-showSwingBull" class="custom-select-sm">
                        <option value="All">All</option>
                        <option value="BOS">BOS</option>
                        <option value="CHoCH">CHoCH</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showSwingBear">Bearish Structure</label>
                    <select id="smc-cfg-showSwingBear" class="custom-select-sm">
                        <option value="All">All</option>
                        <option value="BOS">BOS</option>
                        <option value="CHoCH">CHoCH</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showHighLowSwings">Strong/Weak High/Low</label>
                    <input type="checkbox" id="smc-cfg-showHighLowSwings" checked>
                </div>
            </div>

            <div class="settings-section">
                <h4>Internal Structure</h4>
                <div class="setting-row">
                    <label for="smc-cfg-showInternals">Show Internal Structure</label>
                    <input type="checkbox" id="smc-cfg-showInternals" checked>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-internalFilterConfluence">Confluence Filter</label>
                    <input type="checkbox" id="smc-cfg-internalFilterConfluence">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showInternalBull">Bullish Structure</label>
                    <select id="smc-cfg-showInternalBull" class="custom-select-sm">
                        <option value="All">All</option>
                        <option value="BOS">BOS</option>
                        <option value="CHoCH">CHoCH</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showInternalBear">Bearish Structure</label>
                    <select id="smc-cfg-showInternalBear" class="custom-select-sm">
                        <option value="All">All</option>
                        <option value="BOS">BOS</option>
                        <option value="CHoCH">CHoCH</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h4>Order Blocks</h4>
                <div class="setting-row">
                    <label for="smc-cfg-showSwingOrderBlocks">Swing Order Blocks</label>
                    <input type="checkbox" id="smc-cfg-showSwingOrderBlocks">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-swingOrderBlocksSize">Swing OB Size</label>
                    <input type="number" id="smc-cfg-swingOrderBlocksSize" value="5" min="1" max="20">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showInternalOrderBlocks">Internal Order Blocks</label>
                    <input type="checkbox" id="smc-cfg-showInternalOrderBlocks" checked>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-internalOrderBlocksSize">Internal OB Size</label>
                    <input type="number" id="smc-cfg-internalOrderBlocksSize" value="5" min="1" max="20">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-orderBlockFilter">Filter Method</label>
                    <select id="smc-cfg-orderBlockFilter" class="custom-select-sm">
                        <option value="Atr">ATR</option>
                        <option value="Range">Cumulative Range</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-orderBlockMitigation">Mitigation Source</label>
                    <select id="smc-cfg-orderBlockMitigation" class="custom-select-sm">
                        <option value="High/Low">High/Low</option>
                        <option value="Close">Close</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h4>Equal Highs/Lows & FVGs</h4>
                <div class="setting-row">
                    <label for="smc-cfg-showEqualHighsLows">Equal High/Low</label>
                    <input type="checkbox" id="smc-cfg-showEqualHighsLows" checked>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-equalHighsLowsLength">Bars Confirmation</label>
                    <input type="number" id="smc-cfg-equalHighsLowsLength" value="3" min="1" max="10">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-equalHighsLowsThreshold">EQ Threshold</label>
                    <input type="number" id="smc-cfg-equalHighsLowsThreshold" value="0.1" min="0" max="0.5" step="0.05">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-showFairValueGaps">Fair Value Gaps</label>
                    <input type="checkbox" id="smc-cfg-showFairValueGaps">
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-fairValueGapsThreshold">Auto FVG Threshold</label>
                    <input type="checkbox" id="smc-cfg-fairValueGapsThreshold" checked>
                </div>
                <div class="setting-row">
                    <label for="smc-cfg-fairValueGapsExtend">Extend FVG Bars</label>
                    <input type="number" id="smc-cfg-fairValueGapsExtend" value="1" min="0" max="20">
                </div>
            </div>

            <div class="settings-section">
                <h4>Zones</h4>
                <div class="setting-row">
                    <label for="smc-cfg-showPremiumDiscountZones">Premium/Discount Zones</label>
                    <input type="checkbox" id="smc-cfg-showPremiumDiscountZones">
                </div>
            </div>
        </div>
        <div class="settings-footer">
            <button id="smc-settings-reset" class="btn-secondary">Reset</button>
            <button id="smc-settings-save" class="btn-primary">Apply</button>
        </div>
    </div>

    <!-- App Coordinator -->
    <script src="/static/js/chart_manager.js?v=1.2.0"></script>
</body>
</html>
